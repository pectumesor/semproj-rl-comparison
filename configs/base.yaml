wandb:
  project: semproj
  entity: eazevedo
  group: null        # override per experiment, e.g. "memory_ablation"
  tags: []
  mode: online       # online | offline | disabled

model:
  lr: 0.001
  batch_size: 256
  obs_embed_hidden_sizes: [64, 64]
  backbone_hidden_sizes: [64, 64]
  policy_hidden_sizes: [64, 64]
  value_hidden_sizes: [64, 64]
  save_interval: 10

env:
  name: "NavEnv"
  room_path: "rooms/test_room.json"

  num_classes: 3
  act_dim: 2

  max_speed: 3.0
  max_range: 5.0
  ray_density: 0.2
  fov: 180
  init_pos: {"x": 50.0, "y": 50.0}
  goal_pos: {"x": 10.0, "y": 10.0}


  n_iterations: 100
  max_steps: 512
  num_steps: 256
  num_envs: 32
  n_epochs: 5
  train_freq: 10
  gamma: 0.9

  goal_radius: 4.0      # distance threshold to count as reaching the goal
  dense_reward: true    # potential-based shaping: reward += distance reduction each step

algorithms:
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.1
  val_coeff: 0.8
  aux_coeff: 0.2
  task_coeff: 1.0
  intr_coeff: 0.2
  tau: 0.98
  target_entropy: -2
  init_alpha: 1.0
  actor_lr: 0.001
  critic_lr: 0.001
  alpha_lr: 0.001
    




